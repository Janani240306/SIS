<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; background: #f0f2f5; }
        .sidebar { width: 250px; background: #2c3e50; height: 100vh; color: white; padding: 20px; position: fixed; }
        .main { margin-left: 250px; padding: 30px; width: calc(100% - 250px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #3498db; color: white; }
        .section-h { color: #2c3e50; border-left: 5px solid #e67e22; padding-left: 10px; margin-bottom: 20px; }
        .logout { color: #e74c3c; cursor: pointer; text-decoration: none; font-weight: bold; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .staff-bg { background: #d1ecf1; color: #0c5460; }
        .student-bg { background: #fff3cd; color: #856404; }
        
        /* Delete Button Style */
        .btn-delete { 
            background: #ff7675; color: white; border: none; padding: 6px 10px; 
            border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .btn-delete:hover { background: #d63031; }

        /* Sidebar Link Style */
        .nav-link { color: white; text-decoration: none; display: block; margin: 15px 0; cursor: pointer; }
        .nav-link:hover { color: #3498db; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin</h2><br><hr><br>
        <p onclick="location.reload()" class="nav-link">Dashboard</p>
        <a href="attendance_analysis.html" class="nav-link">Attendance Insights</a>
        <br>
        <a href="index.html" class="logout">Logout</a>
    </div>

    <div class="main">
        <div class="card">
            <h3 class="section-h">User Activity & Data Logs (Staff & Student)</h3>
            <table id="logTable">
                <thead>
                    <tr>
                        <th>User (Name/Roll)</th>
                        <th>Role</th>
                        <th>Activity</th>
                        <th>Time & Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDjCwwm3jJ1NLJtUdYoWSpanrlZjMYMhCc",
            authDomain: "mysisproject-1ceb9.firebaseapp.com",
            projectId: "mysisproject-1ceb9",
            storageBucket: "mysisproject-1ceb9.firebasestorage.app",
            messagingSenderId: "783076340672",
            appId: "1:783076340672:web:f91b6df44337767d0c8e25",
            databaseURL: "https://mysisproject-1ceb9-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Fetch and display logs
        db.ref('activity_logs').orderByChild('time').on('value', (snapshot) => {
            const data = snapshot.val();
            let html = "";
            let logsArray = [];
            
            for(let id in data) { 
                logsArray.unshift({ id: id, ...data[id] }); 
            }

            logsArray.forEach(log => {
                const roleClass = log.role === 'Staff' ? 'staff-bg' : 'student-bg';
                html += `<tr>
                    <td><b>${log.user}</b></td>
                    <td><span class="badge ${roleClass}">${log.role}</span></td>
                    <td>${log.action}</td>
                    <td>${log.time}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteLog('${log.id}')">Delete</button>
                    </td>
                </tr>`;
            });
            document.getElementById('logBody').innerHTML = html;
        });

        // Function to delete a particular entry
        function deleteLog(logId) {
            if(confirm("Are you sure you want to delete this log entry?")) {
                db.ref('activity_logs/' + logId).remove()
                .then(() => {
                    alert("Log entry deleted successfully!");
                })
                .catch((error) => {
                    alert("Error deleting log: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
